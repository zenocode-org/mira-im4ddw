<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compteur +/- — Exemple JS</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 500px; margin: 40px auto; padding: 24px; }
    button { padding: 10px 18px; font-size: 1rem; border: none; border-radius: 8px; background: #00a3a3; color: white; cursor: pointer; margin: 4px; }
    button:hover { background: #008a8a; }
    .compteur-value { font-size: 2rem; font-weight: bold; color: #00a3a3; margin: 16px 0; }
    a { color: #00a3a3; font-size: 0.9rem; }
  </style>
</head>
<body>
  <p><a href="index-exemples.html">← Retour aux exemples</a></p>
  <h1>Compteur + / −</h1>
  <p>Plusieurs boutons, une variable partagée</p>
  <div id="compteur2" class="compteur-value">0</div>
  <button id="btn-plus">+</button>
  <button id="btn-moins">−</button>
  <button id="btn-reset">Reset</button>
  <script>
    let count = 0;
    let affichage = document.getElementById('compteur2');

    function mettreAJour() {
      affichage.textContent = count;
    }

    document.getElementById('btn-plus').addEventListener('click', function() {
      count++;
      mettreAJour();
    });
    document.getElementById('btn-moins').addEventListener('click', function() {
      count--;
      mettreAJour();
    });
    document.getElementById('btn-reset').addEventListener('click', function() {
      count = 0;
      mettreAJour();
    });
  </script>
</body>
</html>
