<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Affichage temps réel — Exemple JS</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 500px; margin: 40px auto; padding: 24px; }
    input { padding: 10px 14px; font-size: 1rem; border: 1px solid #cbd5e1; border-radius: 8px; width: 100%; max-width: 280px; }
    .live-output { min-height: 24px; margin-top: 12px; color: #475569; }
    a { color: #00a3a3; font-size: 0.9rem; }
  </style>
</head>
<body>
  <p><a href="index-exemples.html">← Retour aux exemples</a></p>
  <h1>Affichage en temps réel</h1>
  <p>Événement input — Ce que tu tapes s'affiche en direct</p>
  <input type="text" id="prenom" placeholder="Tape ton prénom...">
  <p class="live-output" id="affichage">Bonjour !</p>
  <script>
    let prenom = document.getElementById('prenom');
    let affichage = document.getElementById('affichage');

    prenom.addEventListener('input', function() {
      let valeur = prenom.value.trim();
      affichage.textContent = valeur ? 'Bonjour ' + valeur + ' !' : 'Bonjour !';
    });
  </script>
</body>
</html>
