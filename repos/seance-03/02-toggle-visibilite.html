<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle visibilité — Exemple JS</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 500px; margin: 40px auto; padding: 24px; }
    .hidden { display: none; }
    button { padding: 10px 18px; font-size: 1rem; border: none; border-radius: 8px; background: #00a3a3; color: white; cursor: pointer; }
    button:hover { background: #008a8a; }
    a { color: #00a3a3; font-size: 0.9rem; }
  </style>
</head>
<body>
  <p><a href="index-exemples.html">← Retour aux exemples</a></p>
  <h1>Toggle de visibilité</h1>
  <p>classList.toggle</p>
  <button id="btnToggle">Afficher / Masquer</button>
  <p id="texteToggle">Je suis visible ! Clique sur le bouton pour me cacher.</p>
  <script>
    let btn = document.getElementById('btnToggle');
    let texte = document.getElementById('texteToggle');
    btn.addEventListener('click', function() {
      texte.classList.toggle('hidden');
    });
  </script>
</body>
</html>
