<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compteur de clics — Exemple JS</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 500px; margin: 40px auto; padding: 24px; }
    button { padding: 10px 18px; font-size: 1rem; border: none; border-radius: 8px; background: #00a3a3; color: white; cursor: pointer; }
    button:hover { background: #008a8a; }
    .compteur-value { font-size: 2rem; font-weight: bold; color: #00a3a3; }
    a { color: #00a3a3; font-size: 0.9rem; }
  </style>
</head>
<body>
  <p><a href="index-exemples.html">← Retour aux exemples</a></p>
  <h1>Compteur de clics</h1>
  <p>addEventListener, textContent</p>
  <button id="btnCompter">Clique-moi</button>
  <p>Clics : <span id="compteur" class="compteur-value">0</span></p>
  <script>
    let btn = document.getElementById('btnCompter');
    let compteur = document.getElementById('compteur');
    let count = 0;
    btn.addEventListener('click', function() {
      count++;
      compteur.textContent = count;
    });
  </script>
</body>
</html>
