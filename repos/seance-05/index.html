<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TP — Météo (Open-Meteo)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: linear-gradient(165deg, #0f172a 0%, #1e3a5f 45%, #0c4a6e 100%);
      color: #e2e8f0;
      padding: 1.5rem;
    }
    .wrap {
      max-width: 28rem;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 0.875rem;
      color: #94a3b8;
      margin: 0 0 1.25rem;
    }
    .card {
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      padding: 1.25rem 1.35rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }
    .ville {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0.5rem;
    }
    #statut {
      font-size: 0.9rem;
      color: #7dd3fc;
      min-height: 1.35em;
    }
    #erreur {
      margin-top: 0.75rem;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      background: rgba(127, 29, 29, 0.45);
      border: 1px solid rgba(248, 113, 113, 0.4);
      color: #fecaca;
      font-size: 0.875rem;
    }
    #erreur[hidden] {
      display: none !important;
    }
    ul#liste-previsions {
      list-style: none;
      margin: 1rem 0 0;
      padding: 0;
    }
    ul#liste-previsions li {
      padding: 0.55rem 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.15);
      font-size: 0.9rem;
      color: #cbd5e1;
    }
    ul#liste-previsions li:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Prévisions</h1>
    <p class="subtitle">Données <a href="https://open-meteo.com/" style="color:#7dd3fc;">Open-Meteo</a> — suis les étapes du <strong>README.md</strong>.</p>
    <div class="card">
      <div class="ville" id="ville">—</div>
      <p id="statut"></p>
      <p id="erreur" hidden></p>
      <ul id="liste-previsions"></ul>
    </div>
  </div>

<script>
/* Tu compléteras ce script étape par étape (voir README.md). */

/* --- Étape 1 uniquement (départ) : URL incomplète — seulement …/v1 (sans /forecast ni paramètres) → le serveur répond 404. */
const URL_METEO = 'https://api.open-meteo.com/v1';

async function chargerMeteo() {
  try {
    const response = await fetch(URL_METEO);
    console.log('Objet Response :', response);
    console.log('status HTTP :', response.status, '| response.ok :', response.ok);
  } catch (err) {
    console.error('Erreur pendant fetch (réseau / CORS / etc.) :', err);
  }
}

chargerMeteo();

/* Les étapes suivantes (sélecteurs, JSON, affichage, messages…) seront ajoutées au fil du TP — voir README. */
</script>
</body>
</html>
